[package]
name = "pdf-core"
version = "0.1.0"
edition = "2024"

[dependencies]
parking_lot = "0.12.4"
image = { version = "0.25.8", features = ["jpeg", "png"] }
byteorder = "1"
log = "0.4.27"

[target.'cfg(any(target_os = "ios", target_os="macos"))'.dependencies]
pdfium-render = { git = "https://github.com/triniwiz/pdfium-render", rev = "28ee78484b5282c2a2345580a4e1df94ae16021d", default-features = false, features = ["pdfium_latest", "static", "thread_safe"] }

[target.'cfg(any(target_os = "android"))'.dependencies]
pdfium-render = { git = "https://github.com/triniwiz/pdfium-render", rev = "28ee78484b5282c2a2345580a4e1df94ae16021d", default-features = false, features = ["pdfium_latest", "thread_safe"] }
once_cell = "1.21.3"
jni = "0.21.1"