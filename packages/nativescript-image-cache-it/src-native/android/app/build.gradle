apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin:  'kotlin-kapt'

android {
  compileSdk 35
  defaultConfig {
    applicationId "com.github.triniwiz.imagedemo"
    minSdkVersion 21
    targetSdk 35
    versionCode 1
    versionName "1.0"
    testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
  }
  buildTypes {
    release {
      minifyEnabled false
      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
    }
  }
  buildFeatures {
    viewBinding true
    dataBinding true
  }
  namespace 'com.github.triniwiz.imagedemo'
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}

dependencies {
  implementation fileTree(dir: 'libs', include: ['*.jar'])
  implementation 'androidx.appcompat:appcompat:1.7.0'
  implementation 'androidx.constraintlayout:constraintlayout:1.1.3'
  testImplementation 'junit:junit:4.12'
  androidTestImplementation 'androidx.test.ext:junit:1.1.1'
  androidTestImplementation 'androidx.test.espresso:espresso-core:3.1.0'
  implementation 'com.squareup.okhttp3:okhttp:4.11.0'
  implementation 'com.github.bumptech.glide:okhttp3-integration:5.0.5'
  implementation 'jp.wasabeef:glide-transformations:4.3.0'
  implementation 'com.github.triniwiz:android-gpuimage:9a33c87c1f'
  implementation 'com.github.bumptech.glide:glide:5.0.5'
  kapt 'com.github.bumptech.glide:compiler:5.0.5'
  kapt 'androidx.annotation:annotation:1.9.1'
  implementation 'androidx.recyclerview:recyclerview:1.4.0'
  implementation project(path: ':imagecacheit')
  implementation "androidx.core:core-ktx:1.13.0"
}
repositories {
  mavenCentral()
}
